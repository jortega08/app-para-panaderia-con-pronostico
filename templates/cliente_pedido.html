<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panaderia - Registra tu Compra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="cliente-page">

<div class="cliente-container">
    {# ── HEADER ── #}
    <div class="cliente-header">
        <span class="cliente-logo">&#x1F35E;</span>
        <h1>Panaderia</h1>
        <p>Registra tu compra</p>
    </div>

    {# ── PRODUCTOS ── #}
    <div class="cliente-products" id="productGrid">
        {% for p in productos %}
        <button class="cliente-product-btn" onclick="toggleProduct('{{ p.nombre }}', {{ p.precio }}, '{{ p.icono }}')"
                id="prodBtn-{{ loop.index }}" style="--prod-color: {{ p.color }}">
            <span class="cliente-prod-icon">{{ p.icono }}</span>
            <span class="cliente-prod-name">{{ p.nombre }}</span>
            <span class="cliente-prod-price">${{ '%.2f'|format(p.precio) }}</span>
        </button>
        {% endfor %}
    </div>

    {# ── CARRITO ── #}
    <div class="cliente-cart" id="clienteCart" style="display: none;">
        <h3>Tu pedido:</h3>
        <div id="clienteCartItems"></div>
        <div class="cliente-total">
            <span>Total:</span>
            <strong id="clienteTotal">$0.00</strong>
        </div>
    </div>

    {# ── BOTON REGISTRAR ── #}
    <button class="cliente-submit" id="submitBtn" onclick="registrar()" disabled>
        Registrar Compra
    </button>

    {# ── EXITO ── #}
    <div class="cliente-success" id="successMsg" style="display: none;">
        <span class="success-icon">&#x2705;</span>
        <h2>Compra registrada!</h2>
        <p id="successDetail"></p>
        <button class="cliente-new-btn" onclick="resetPage()">Nueva compra</button>
    </div>
</div>

<script>
let clienteCart = [];

function toggleProduct(nombre, precio, icono) {
    const existing = clienteCart.find(i => i.nombre === nombre);
    if (existing) {
        existing.cantidad++;
    } else {
        clienteCart.push({nombre, precio, icono, cantidad: 1});
    }
    renderClienteCart();
}

function updateClienteQty(nombre, qty) {
    qty = parseInt(qty);
    if (isNaN(qty) || qty < 0) return;
    if (qty === 0) {
        clienteCart = clienteCart.filter(i => i.nombre !== nombre);
    } else {
        const item = clienteCart.find(i => i.nombre === nombre);
        if (item) item.cantidad = qty;
    }
    renderClienteCart();
}

function renderClienteCart() {
    const cartDiv = document.getElementById('clienteCart');
    const itemsDiv = document.getElementById('clienteCartItems');
    const totalEl = document.getElementById('clienteTotal');
    const submitBtn = document.getElementById('submitBtn');

    if (clienteCart.length === 0) {
        cartDiv.style.display = 'none';
        submitBtn.disabled = true;
        return;
    }

    cartDiv.style.display = 'block';
    submitBtn.disabled = false;

    let total = 0;
    itemsDiv.innerHTML = clienteCart.map(item => {
        const sub = item.precio * item.cantidad;
        total += sub;
        return `
        <div class="cliente-cart-item">
            <span>${item.icono} ${item.nombre}</span>
            <div class="cliente-qty-controls">
                <button onclick="updateClienteQty('${item.nombre}', ${item.cantidad - 1})">-</button>
                <input type="number" value="${item.cantidad}" min="1"
                       onchange="updateClienteQty('${item.nombre}', this.value)">
                <button onclick="updateClienteQty('${item.nombre}', ${item.cantidad + 1})">+</button>
            </div>
            <span>$${sub.toFixed(2)}</span>
        </div>`;
    }).join('');

    totalEl.textContent = '$' + total.toFixed(2);
}

function registrar() {
    if (clienteCart.length === 0) return;

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Registrando...';

    const items = clienteCart.map(i => ({
        producto: i.nombre,
        cantidad: i.cantidad,
        precio: i.precio,
    }));

    fetch('/api/venta', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({items: items}),
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) {
            const total = clienteCart.reduce((s, i) => s + i.precio * i.cantidad, 0);
            const detalle = clienteCart.map(i =>
                i.icono + ' ' + i.cantidad + 'x ' + i.nombre
            ).join(', ');

            document.getElementById('successDetail').textContent =
                detalle + ' — Total: $' + total.toFixed(2);

            document.querySelector('.cliente-container').classList.add('show-success');
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('productGrid').style.display = 'none';
            document.getElementById('clienteCart').style.display = 'none';
            submitBtn.style.display = 'none';
        } else {
            alert('Error al registrar. Intenta de nuevo.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Registrar Compra';
        }
    })
    .catch(err => {
        alert('Error de conexion: ' + err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Registrar Compra';
    });
}

function resetPage() {
    clienteCart = [];
    document.getElementById('successMsg').style.display = 'none';
    document.getElementById('productGrid').style.display = '';
    document.getElementById('submitBtn').style.display = '';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'Registrar Compra';
    document.querySelector('.cliente-container').classList.remove('show-success');
    renderClienteCart();
}
</script>
</body>
</html>
