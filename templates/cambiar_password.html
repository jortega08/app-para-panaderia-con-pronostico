{% extends "base.html" %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-accent"></div>
        <div class="login-brand-lockup">
            <div class="login-logo-shell">
                <img src="{{ url_for('static', filename=brand_context.logo_path, v='20260416-platform') }}" alt="{{ brand_context.brand_name }}" class="login-logo">
            </div>
            <div class="login-brand-copy">
                <h1 class="login-title">{{ brand_context.brand_name }}</h1>
                <p class="login-subtitle">Cambio de contraseña requerido</p>
            </div>
        </div>

        <div class="login-divider"></div>

        <p class="login-instruction">Debes establecer una nueva contraseña antes de continuar.</p>

        <div id="alertMsg" class="form-alert" style="display:none"></div>

        <form id="cambioForm" style="display:flex;flex-direction:column;gap:14px;margin-top:8px">
            <div class="form-field">
                <label class="form-label" for="nuevaPassword">Nueva contraseña</label>
                <input type="password" id="nuevaPassword" name="nueva_password" class="form-input"
                       placeholder="Mínimo 8 caracteres" autocomplete="new-password" required minlength="8">
            </div>
            <div class="form-field">
                <label class="form-label" for="confirmarPassword">Confirmar contraseña</label>
                <input type="password" id="confirmarPassword" name="confirmar_password" class="form-input"
                       placeholder="Repite la contraseña" autocomplete="new-password" required minlength="8">
            </div>
            <button type="submit" class="login-btn-password" id="btnGuardar">Guardar contraseña</button>
        </form>

        <p class="login-hint" style="margin-top:16px">Tu contraseña debe tener al menos 8 caracteres.</p>
    </div>
</div>

<script>
document.getElementById('cambioForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const nueva = document.getElementById('nuevaPassword').value;
    const confirmar = document.getElementById('confirmarPassword').value;
    const btn = document.getElementById('btnGuardar');
    const alerta = document.getElementById('alertMsg');

    alerta.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
        const res = await fetch('/api/cambiar-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nueva_password: nueva, confirmar_password: confirmar })
        });
        const data = await res.json();
        if (data.ok) {
            window.location.href = data.data.redirect || '/';
        } else {
            alerta.textContent = data.error || 'Error al cambiar contraseña';
            alerta.className = 'form-alert form-alert-error';
            alerta.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Guardar contraseña';
        }
    } catch {
        alerta.textContent = 'Error de conexión. Intenta de nuevo.';
        alerta.className = 'form-alert form-alert-error';
        alerta.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Guardar contraseña';
    }
});
</script>
{% endblock %}
